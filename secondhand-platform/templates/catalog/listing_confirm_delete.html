{% extends "base.html" %}

{% block title %}删除商品 - 二手交易平台{% endblock %}

{% block content %}
<section class="profile-layout" aria-labelledby="delete-listing-title">
    <div class="profile-showcase">
        <p class="eyebrow">删除确认</p>
        <h1 id="delete-listing-title">{{ listing.title }}</h1>

        <div class="profile-summary" aria-label="删除说明">
            <p>删除后商品和已上传图片记录会被移除。</p>
            <p>这个动作只会影响当前商品。</p>
        </div>
    </div>

    <div class="profile-panel">
        <div class="profile-panel-header">
            <p class="eyebrow">{{ listing.get_status_display }}</p>
            <h2>确认删除商品</h2>
        </div>

        <form class="form-stack" method="post">
            {% csrf_token %}
            <p class="lede">确认删除“{{ listing.title }}”吗？</p>
            <div class="form-actions">
                <button class="button" type="submit">确认删除</button>
                <a class="button-secondary" href="{% url 'catalog:listing_edit' listing.pk %}">返回编辑</a>
                <a class="button-secondary" href="{% url 'users:profile' %}">返回资料页</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
